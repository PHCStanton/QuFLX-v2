<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Round Blue Mic Button with Custom SVG</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            /* dark background to make the button pop */
        }

        .mic-button {
            width: 160px;
            height: 160px;
            border-radius: 50%;

            /* Light inner background with subtle gradient */
            background: linear-gradient(145deg, #f1f5f9, #e2e8f0);

            /* Prominent blue ring + soft outer glow */
            box-shadow:
                0 0 0 10px #60a5fa,
                /* main blue border */
                0 0 0 16px rgba(96, 165, 250, 0.25),
                /* softer blue halo */
                inset 0 6px 12px rgba(0, 0, 0, 0.08),
                /* inner shadow for depth */
                inset 0 -6px 12px rgba(255, 255, 255, 0.7);
            /* inner highlight */

            border: none;
            outline: none;
            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .mic-button:hover {
            transform: translateY(-4px);
            box-shadow:
                0 0 0 10px #3b82f6,
                0 0 0 20px rgba(59, 130, 246, 0.35),
                inset 0 6px 14px rgba(0, 0, 0, 0.12),
                inset 0 -6px 14px rgba(255, 255, 255, 0.8);
        }

        .mic-button:active {
            transform: translateY(2px);
            box-shadow:
                0 0 0 10px #60a5fa,
                inset 0 8px 16px rgba(0, 0, 0, 0.18),
                inset 0 -4px 10px rgba(255, 255, 255, 0.6);
        }

        .mic-icon {
            width: 62%;
            height: 62%;
            color: #2563eb;
            /* blue tone matching the ring */
            filter: drop-shadow(0 3px 6px rgba(37, 99, 235, 0.25));
        }

        /* Optional glossy shine in top-left */
        .mic-button::after {
            content: "";
            position: absolute;
            top: 15%;
            left: 20%;
            width: 35%;
            height: 35%;
            background: radial-gradient(circle at 30% 30%,
                    rgba(255, 255, 255, 0.75) 0%,
                    transparent 65%);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <button class="mic-button" aria-label="Microphone">
        <!-- Your provided SVG mic icon -->
        <svg class="mic-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
            <g style="stroke: none; stroke-width: 0; stroke-dasharray: none; stroke-linecap: butt; stroke-linejoin: miter; stroke-miterlimit: 10; fill: none; fill-rule: nonzero; opacity: 1;"
                transform="translate(1.4065934065934016 1.4065934065934016) scale(2.81 2.81)">
                <path
                    d="M 45 70.968 c -16.013 0 -29.042 -13.028 -29.042 -29.042 c 0 -1.712 1.388 -3.099 3.099 -3.099 c 1.712 0 3.099 1.388 3.099 3.099 C 22.157 54.522 32.404 64.77 45 64.77 c 12.595 0 22.843 -10.248 22.843 -22.843 c 0 -1.712 1.387 -3.099 3.099 -3.099 s 3.099 1.388 3.099 3.099 C 74.042 57.94 61.013 70.968 45 70.968 z"
                    style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-linejoin: miter; stroke-miterlimit: 10; fill: currentColor; fill-rule: nonzero; opacity: 1;"
                    transform="matrix(1 0 0 1 0 0)" stroke-linecap="round" />
                <path
                    d="M 45 60.738 L 45 60.738 c -10.285 0 -18.7 -8.415 -18.7 -18.7 V 18.7 C 26.3 8.415 34.715 0 45 0 h 0 c 10.285 0 18.7 8.415 18.7 18.7 v 23.337 C 63.7 52.322 55.285 60.738 45 60.738 z"
                    style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-linejoin: miter; stroke-miterlimit: 10; fill: currentColor; fill-rule: nonzero; opacity: 1;"
                    transform="matrix(1 0 0 1 0 0)" stroke-linecap="round" />
                <path
                    d="M 45 89.213 c -1.712 0 -3.099 -1.387 -3.099 -3.099 V 68.655 c 0 -1.712 1.388 -3.099 3.099 -3.099 c 1.712 0 3.099 1.387 3.099 3.099 v 17.459 C 48.099 87.826 46.712 89.213 45 89.213 z"
                    style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-linejoin: miter; stroke-miterlimit: 10; fill: currentColor; fill-rule: nonzero; opacity: 1;"
                    transform="matrix(1 0 0 1 0 0)" stroke-linecap="round" />
                <path
                    d="M 55.451 90 H 34.549 c -1.712 0 -3.099 -1.387 -3.099 -3.099 s 1.388 -3.099 3.099 -3.099 h 20.901 c 1.712 0 3.099 1.387 3.099 3.099 S 57.163 90 55.451 90 z"
                    style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-linejoin: miter; stroke-miterlimit: 10; fill: currentColor; fill-rule: nonzero; opacity: 1;"
                    transform="matrix(1 0 0 1 0 0)" stroke-linecap="round" />
            </g>
        </svg>
    </button>

</body>

</html>
